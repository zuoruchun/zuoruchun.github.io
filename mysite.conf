<script type="text/javascript">
(function() {
  var pageMap = {
    "index.html": { en: "index.html", zh: "index_zh.html" },
    "index_zh.html": { en: "index.html", zh: "index_zh.html" },
    "publications.html": { en: "publications.html", zh: "publications_zh.html" },
    "publications_zh.html": { en: "publications.html", zh: "publications_zh.html" },
    "research.html": { en: "research.html", zh: "research_zh.html" },
    "research_zh.html": { en: "research.html", zh: "research_zh.html" }
  };
  function currentPage() {
    var file = window.location.pathname.split("/").pop();
    return file || "index.html";
  }
  function currentLanguage(file) {
    return /_zh\.html$/.test(file) ? "zh" : "en";
  }
  function preferredLanguage() {
    try {
      return window.localStorage.getItem("preferredLang");
    } catch (err) {
      return null;
    }
  }
  function saveLanguage(lang) {
    try {
      window.localStorage.setItem("preferredLang", lang);
    } catch (err) {}
  }
  function goToLanguage(lang) {
    var file = currentPage();
    var pair = pageMap[file];
    var target = pair ? pair[lang] : file;
    saveLanguage(lang);
    if (target) {
      window.location.href = target;
    }
  }
  var file = currentPage();
  var lang = currentLanguage(file);
  var preferred = preferredLanguage();
  var mapping = pageMap[file];
  if (mapping && preferred && preferred !== lang) {
    window.location.replace(mapping[preferred]);
  }
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  document.addEventListener("DOMContentLoaded", function() {
    var button = document.getElementById("lang-toggle");
    var nextLang = lang === "zh" ? "en" : "zh";
    if (!button) {
      return;
    }
    button.textContent = nextLang === "zh" ? "中文" : "English";
    button.setAttribute("aria-label", nextLang === "zh" ? "切换到中文" : "Switch to English");
    button.onclick = function() {
      goToLanguage(nextLang);
    };
  });
})();
</script>
<!-- End MathJax -->
